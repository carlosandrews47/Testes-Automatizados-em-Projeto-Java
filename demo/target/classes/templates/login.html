<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAccess Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0b0e14;
            --surface:   #111520;
            --border:    #1e2536;
            --border2:   #2a3350;
            --accent:    #2563eb;
            --accent-h:  #1d4ed8;
            --accent2:   #e65100;
            --accent2-h: #bf4500;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --success:   #16a34a;
            --success-bg:#052e16;
            --error:     #dc2626;
            --error-bg:  #1c0707;
            --mono:      'IBM Plex Mono', monospace;
            --sans:      'IBM Plex Sans', sans-serif;
            --radius:    6px;
            --transition: 180ms ease;
        }

        html, body {
            min-height: 100vh;
            background: var(--bg);
            font-family: var(--sans);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Background grid pattern ──────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Card ─────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 2rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────── */
        .card-header {
            padding: 1.75rem 2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            stroke: #fff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-name {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.04em;
        }

        .logo-sub {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── Tabs ─────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color var(--transition), border-color var(--transition);
        }

        .tab-btn:hover { color: var(--text); }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-btn.active-orange {
            color: var(--accent2);
            border-bottom-color: var(--accent2);
        }

        /* ── Body ─────────────────────────────────────────── */
        .card-body { padding: 1.75rem 2rem; }

        /* ── Panels ───────────────────────────────────────── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Alerts ───────────────────────────────────────── */
        .alert {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 1.25rem;
            font-family: var(--mono);
        }

        .alert-error {
            background: var(--error-bg);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .alert-success {
            background: var(--success-bg);
            border: 1px solid var(--success);
            color: #86efac;
        }

        /* ── Fields ───────────────────────────────────────── */
        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--mono);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .field input::placeholder { color: var(--muted); opacity: 0.6; }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        .hint {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            margin-top: 5px;
            line-height: 1.5;
        }

        /* ── Nivel selector (RF07) ────────────────────────── */
        .nivel-label {
            font-size: 11px;
            font-weight: 500;
            font-family: var(--mono);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .nivel-group {
            display: flex;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .nivel-opt { display: none; }

        .nivel-opt + label {
            flex: 1;
            padding: 8px 4px;
            text-align: center;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
        }

        .nivel-opt:checked + label {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(37,99,235,0.1);
        }

        /* ── Buttons ──────────────────────────────────────── */
        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            margin-top: 4px;
            transition: background var(--transition), transform 80ms;
        }

        .btn:active { transform: scale(0.98); }

        .btn-blue  { background: var(--accent);  color: #fff; }
        .btn-blue:hover  { background: var(--accent-h); }

        .btn-orange { background: var(--accent2); color: #fff; }
        .btn-orange:hover { background: var(--accent2-h); }

        /* ── Divider ──────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0 1rem;
        }

        .footer-text {
            text-align: center;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── Fade animation ───────────────────────────────── */
        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
        .panel.active { animation: fadein 200ms ease; }
    </style>
</head>
<body>

<div class="card">

    <div class="card-header">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div>
                <div class="logo-name">SecureAccess</div>
                <div class="logo-sub">Systems Corp.</div>
            </div>
        </div>

        <div class="tabs" role="tablist">
            <button class="tab-btn active"
                    id="tab-login"
                    role="tab"
                    aria-selected="true"
                    aria-controls="panel-login"
                    onclick="showPanel('login')">Login</button>
            <button class="tab-btn"
                    id="tab-cadastro"
                    role="tab"
                    aria-selected="false"
                    aria-controls="panel-cadastro"
                    onclick="showPanel('cadastro')">Cadastro</button>
            <button class="tab-btn"
                    id="tab-senha"
                    role="tab"
                    aria-selected="false"
                    aria-controls="panel-senha"
                    onclick="showPanel('senha')">Alterar senha</button>
        </div>
    </div>

    <div class="card-body">

        <div id="panel-login" class="panel active" role="tabpanel" aria-labelledby="tab-login">

            <div th:if="${modo == 'login'}">
                <div class="alert alert-error"    th:if="${erro}"   th:text="${erro}"></div>
                <div class="alert alert-success"  th:if="${sucesso}" th:text="${sucesso}"></div>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="login-email">E-mail corporativo</label>
                    <input type="email"
                           id="login-email"
                           name="email"
                           required
                           placeholder="nome@empresa.com"
                           autocomplete="email">
                </div>
                <div class="field">
                    <label for="login-senha">Senha</label>
                    <input type="password"
                           id="login-senha"
                           name="senha"
                           required
                           placeholder="••••••••••••"
                           autocomplete="current-password">
                    <p class="hint">10–12 caracteres · letras + números + especial</p>
                </div>
                <button type="submit" class="btn btn-blue">Entrar no sistema</button>
            </form>
        </div>

        <div id="panel-cadastro" class="panel" role="tabpanel" aria-labelledby="tab-cadastro">

            <div th:if="${modo == 'cadastro'}">
                <div class="alert alert-error"    th:if="${erro}"   th:text="${erro}"></div>
                <div class="alert alert-success"  th:if="${sucesso}" th:text="${sucesso}"></div>
            </div>

            <form th:action="@{/cadastro}" method="post">
                <div class="field">
                    <label for="cad-nome">Nome completo</label>
                    <input type="text"
                           id="cad-nome"
                           name="nome"
                           required
                           placeholder="Digite seu nome completo">
                </div>
                <div class="field">
                    <label for="cad-login">Login (nome de usuário)</label>
                    <input type="text"
                           id="cad-login"
                           name="login"
                           required
                           placeholder="Escolha um apelido de login">
                </div>
                <div class="field">
                    <label for="cad-email">E-mail corporativo</label>
                    <input type="email"
                           id="cad-email"
                           name="email"
                           required
                           placeholder="nome@empresa.com">
                </div>
                <div class="field">
                    <label for="cad-senha">Senha segura (10 a 12 caracteres)</label>
                    <input type="password"
                           id="cad-senha"
                           name="senha"
                           required
                           placeholder="Ex: Senh@Web2026">
                    <p class="hint">Letras + números + !@#$%&amp;*()</p>
                </div>

                <div class="nivel-label">Nível de acesso (RF07)</div>
                <div class="nivel-group">
                    <input type="radio" class="nivel-opt" name="nivelUsuario" id="n-cliente" value="CLIENTE" checked>
                    <label for="n-cliente">Cliente</label>

                    <input type="radio" class="nivel-opt" name="nivelUsuario" id="n-gerente" value="GERENTE">
                    <label for="n-gerente">Gerente</label>

                    <input type="radio" class="nivel-opt" name="nivelUsuario" id="n-admin" value="ADMIN">
                    <label for="n-admin">Admin</label>
                </div>

                <button type="submit" class="btn btn-blue">Finalizar cadastro</button>
            </form>
        </div>

        <div id="panel-senha" class="panel" role="tabpanel" aria-labelledby="tab-senha">

            <div th:if="${modo == 'senha'}">
                <div class="alert alert-error"    th:if="${erro}"   th:text="${erro}"></div>
                <div class="alert alert-success"  th:if="${sucesso}" th:text="${sucesso}"></div>
            </div>

            <form th:action="@{/alterar-senha}" method="post">
                <div class="field">
                    <label for="alt-email">Confirme seu e-mail</label>
                    <input type="email"
                           id="alt-email"
                           name="email"
                           required
                           placeholder="nome@empresa.com">
                </div>
                <div class="field">
                    <label for="alt-senha">Nova senha corporativa</label>
                    <input type="password"
                           id="alt-senha"
                           name="novaSenha"
                           required
                           placeholder="Mínimo 10 caracteres">
                    <p class="hint">Deve conter letras, números e !@#$%&amp;*()</p>
                </div>
                <button type="submit" class="btn btn-orange">Atualizar senha</button>
            </form>
        </div>

        <div class="divider"></div>
        <p class="footer-text">SecureAccess Systems · Ambiente Seguro</p>
    </div>
</div>

<script th:inline="javascript">
    const PANELS = ['login', 'cadastro', 'senha'];
    const ORANGE = 'senha';

    function showPanel(id) {
        PANELS.forEach(p => {
            const panel = document.getElementById('panel-' + p);
            const tab   = document.getElementById('tab-'   + p);

            const isActive = p === id;
            if(panel && tab) {
                panel.classList.toggle('active', isActive);
                tab.setAttribute('aria-selected', isActive);
                tab.classList.remove('active', 'active-orange');
                if (isActive) {
                    tab.classList.add(p === ORANGE ? 'active-orange' : 'active');
                }
            }
        });
    }

    // Lê dinamicamente a propriedade "modo" enviada pelo Spring Boot para manter a aba correta aberta após o post.
    (function autoTab() {
        /*[[${modo}]]*/
        const modoBackend = /*[[${modo}]]*/ 'login';
        if (modoBackend === 'cadastro') {
            showPanel('cadastro');
        } else if (modoBackend === 'senha') {
            showPanel('senha');
        } else {
            showPanel('login');
        }
    })();
</script>

</body>
</html>
