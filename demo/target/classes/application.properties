# ============================================================
#  SecureAccess Systems - Configuração da Aplicação
#  Tecnologia: Spring Boot + H2 Database (em memória)
# ============================================================

# Nome da aplicação
spring.application.name=SecureAccess-Demo

# --- Configuração de Porta (Evita o erro de porta 8080 já em uso) ---
server.port=8081

# --- Banco de Dados H2 (RF: Banco H2 obrigatório) ---
spring.datasource.url=jdbc:h2:mem:secureaccess;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Console H2 (acessível em: http://localhost:8081/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true